name: CI-CD-Pipeline
on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Required for building ARM images on an x86 runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      # Required for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Multi-Platform
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Builds for both standard Intel/AMD and Oracle Ampere (ARM)
          platforms: linux/amd64,linux/arm64 
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/oci-web-app:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/oci-web-app:${{ github.sha }}

      - name: Update K8s Manifest
        run: |
          # Use the SHA-tagged image for precise deployments
          sed -i "s|image:.*|image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/oci-web-app:${{ github.sha }}|g" k8s/deployment.yaml
          
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Deploy multi-arch image ${{ github.sha }}"
          git push
