name: CI-CD-Pipeline
on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to OCIR
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.OCIR_REGISTRY }}
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          # We use the GitHub SHA to make every image unique
          docker build -t ${{ secrets.OCIR_REPO }}:${{ github.sha }} .
          docker push ${{ secrets.OCIR_REPO }}:${{ github.sha }}

      - name: Update Kubernetes Manifest
        run: |
          # This replaces the 'image:' line in your k8s/deployment.yaml with the new tag
          sed -i "s|image:.*|image: ${{ secrets.OCIR_REPO }}:${{ github.sha }}|g" k8s/deployment.yaml
          
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Automated: Deploy image ${{ github.sha }}"
          git push
