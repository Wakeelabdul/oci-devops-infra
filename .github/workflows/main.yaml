name: CI-CD-Pipeline
on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Added "permissions" block here just in case settings aren't enough
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/oci-web-app:${{ github.sha }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/oci-web-app:${{ github.sha }}

      - name: Update K8s Manifest
        run: |
          # Matches the image line in your k8s/deployment.yaml and replaces it
          sed -i "s|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/oci-web-app:${{ github.sha }}|g" k8s/deployment.yaml
          
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Deploy image ${{ github.sha }} from Docker Hub"
          git push
