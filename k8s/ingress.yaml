apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oci-web-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    # CRITICAL: This allows /app2 to map to the root of your app
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: "oci-app.local"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: oci-web-service 
            port:
              number: 80 # Use the Service port, not the ContainerPort
      - path: /app2
        pathType: Prefix
        backend:
          service:
            name: oci-web-service2
            port:
              number: 80 # Use the Service port (80) defined in deployment2.yaml
